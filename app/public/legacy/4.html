            },

<h2 class="text-warm-text text-2xl font-bold leading-tight text-center mb-3 tracking-tight">

<p class="text-warm-text/70 text-sm font-normal leading-relaxed text-center max-w-[280px]">
                    랜덤한 반 친구와 대화가 시작됩니다.<br/>질문이 나오면 답해주세요.
                </p>
</div>
<div class="flex flex-col gap-4">
<div class="px-1 mb-2">

<div class="flex flex-col p-6 bg-white rounded-2xl border border-warm-accent/20 shadow-card hover:shadow-md transition-shadow duration-300">
<div class="flex items-center gap-3 mb-2">

</div>

</div>

</div>

<div class="h-8"></div>

<div class="relative flex items-center">
<input class="peer h-6 w-6 cursor-pointer appearance-none rounded-full border-2 border-warm-text/20 bg-white transition-all checked:border-warm-primary checked:bg-warm-primary hover:border-warm-primary focus:ring-0 focus:ring-offset-0" id="agree-check" onchange="document.getElementById('start-btn').disabled = !this.checked; document.getElementById('start-btn').classList.toggle('opacity-50', !this.checked); document.getElementById('start-btn').classList.toggle('cursor-not-allowed', !this.checked);" type="checkbox"/>
<span class="material-symbols-outlined absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 text-[16px] text-white opacity-0 peer-checked:opacity-100 pointer-events-none font-bold">check</span>
</div>
<div class="">
<p class="text-warm-text font-bold text-[15px] group-hover:text-warm-primary transition-colors">위 약속을 지키며 대화할게요</p>
</div>
</label>
<button class="w-full bg-warm-primary hover:bg-[#FF8A5B] text-white font-bold text-lg py-4 rounded-2xl transition-all active:scale-[0.98] shadow-soft flex items-center justify-center gap-2 opacity-50 cursor-not-allowed disabled:hover:bg-warm-primary disabled:active:scale-100" data-nav="next" disabled="" id="start-btn">
<span>시작하기</span>
<span class="material-symbols-outlined text-[22px]">arrow_forward</span>
</button>
</div>
