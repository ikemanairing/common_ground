<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>현재 나의 마음 확인하기</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&amp;family=Noto+Sans+KR:wght@400;500;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee8c2b",
                        "background-light": "#f8f7f6",
                        "background-dark": "#221910",
                        "surface-light": "#ffffff",
                        "surface-dark": "#2c241b",
                        "text-primary-light": "#1b140d",
                        "text-primary-dark": "#f0e6dd",
                        "text-secondary-light": "#9a734c",
                        "text-secondary-dark": "#b08d6b",
                        "border-light": "#e7dbcf",
                        "border-dark": "#4a3b2f",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans KR", "sans-serif"],
                        "body": ["Noto Sans KR", "sans-serif"]
                    },
                    borderRadius: {"DEFAULT": "1rem", "lg": "1.5rem", "xl": "2rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        /* Custom Radio Button Styling */
        input[type="radio"]:checked {
            background-image: url("data:image/svg+xml,%3csvg viewBox='0 0 16 16' fill='%23ee8c2b' xmlns='http://www.w3.org/2000/svg'%3e%3ccircle cx='8' cy='8' r='4'/%3e%3c/svg%3e");
            border-color: #ee8c2b;
            background-color: transparent;
        }
        
        .custom-radio-container:has(input:checked) {
            border-color: #ee8c2b;
            background-color: rgba(238, 140, 43, 0.05);
        }

        /* Dark mode overrides for radio checked state if needed via CSS classes, but handling mainly via Tailwind classes */
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<script src="./mobile-app-nav.js" defer></script>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display min-h-screen flex flex-col items-center justify-center antialiased selection:bg-primary/30">
<div class="relative flex h-full min-h-screen w-full max-w-md flex-col overflow-hidden bg-background-light dark:bg-background-dark shadow-2xl transition-colors duration-300">
<!-- Header -->
<header class="flex items-center justify-between px-4 py-3 bg-background-light dark:bg-background-dark sticky top-0 z-10">
<button aria-label="Go back" data-nav="back" class="flex items-center justify-center p-2 rounded-full text-text-primary-light dark:text-text-primary-dark hover:bg-black/5 dark:hover:bg-white/5 transition-colors">
<span class="material-symbols-outlined !text-[24px]">arrow_back</span>
</button>
<div class="flex-1"></div> <!-- Spacer -->
<button data-nav="next" class="px-3 py-1 text-sm font-bold text-text-secondary-light dark:text-text-secondary-dark hover:text-primary dark:hover:text-primary transition-colors">
                Skip
            </button>
</header>
<!-- Progress Bar (Optional context indicator) -->
<div class="w-full px-6 pt-2 pb-4">
<div class="h-1.5 w-full bg-border-light dark:bg-border-dark rounded-full overflow-hidden">
<div class="h-full bg-primary w-2/5 rounded-full"></div>
</div>
</div>
<!-- Main Content -->
<main class="flex-1 flex flex-col px-6 pb-6 overflow-y-auto">
<h1 class="text-text-primary-light dark:text-text-primary-dark text-[26px] font-bold leading-[1.3] mb-8 tracking-tight">
                지금 느낌이<br/>제일 가까운 건 뭐야?
            </h1>
<form class="flex flex-col gap-3">
<!-- Option 1 -->
<label class="custom-radio-container cursor-pointer group relative flex items-center gap-4 rounded-xl border border-solid border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-5 transition-all duration-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm">
<input checked="" class="h-5 w-5 appearance-none rounded-full border-2 border-border-light dark:border-gray-500 checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" name="emotion" type="radio"/>
<div class="flex grow flex-col">
<span class="text-text-primary-light dark:text-text-primary-dark text-[15px] font-medium leading-normal group-hover:text-primary transition-colors">
                            😌 마음이 좀 편해졌다
                        </span>
</div>
</label>
<!-- Option 2 -->
<label class="custom-radio-container cursor-pointer group relative flex items-center gap-4 rounded-xl border border-solid border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-5 transition-all duration-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm">
<input class="h-5 w-5 appearance-none rounded-full border-2 border-border-light dark:border-gray-500 checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" name="emotion" type="radio"/>
<div class="flex grow flex-col">
<span class="text-text-primary-light dark:text-text-primary-dark text-[15px] font-medium leading-normal group-hover:text-primary transition-colors">
                            🙂 생각보다 재밌었다
                        </span>
</div>
</label>
<!-- Option 3 -->
<label class="custom-radio-container cursor-pointer group relative flex items-center gap-4 rounded-xl border border-solid border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-5 transition-all duration-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm">
<input class="h-5 w-5 appearance-none rounded-full border-2 border-border-light dark:border-gray-500 checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" name="emotion" type="radio"/>
<div class="flex grow flex-col">
<span class="text-text-primary-light dark:text-text-primary-dark text-[15px] font-medium leading-normal group-hover:text-primary transition-colors">
                            😅 아직 어색하지만 괜찮다
                        </span>
</div>
</label>
<!-- Option 4 -->
<label class="custom-radio-container cursor-pointer group relative flex items-center gap-4 rounded-xl border border-solid border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-5 transition-all duration-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm">
<input class="h-5 w-5 appearance-none rounded-full border-2 border-border-light dark:border-gray-500 checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" name="emotion" type="radio"/>
<div class="flex grow flex-col">
<span class="text-text-primary-light dark:text-text-primary-dark text-[15px] font-medium leading-normal group-hover:text-primary transition-colors">
                            😐 그냥 그랬다
                        </span>
</div>
</label>
<!-- Option 5 -->
<label class="custom-radio-container cursor-pointer group relative flex items-center gap-4 rounded-xl border border-solid border-border-light dark:border-border-dark bg-surface-light dark:bg-surface-dark p-5 transition-all duration-200 hover:border-primary/50 dark:hover:border-primary/50 hover:shadow-sm">
<input class="h-5 w-5 appearance-none rounded-full border-2 border-border-light dark:border-gray-500 checked:border-primary focus:outline-none focus:ring-2 focus:ring-primary/20 transition-all" name="emotion" type="radio"/>
<div class="flex grow flex-col">
<span class="text-text-primary-light dark:text-text-primary-dark text-[15px] font-medium leading-normal group-hover:text-primary transition-colors">
                            🙃 조금 피곤했다
                        </span>
</div>
</label>
</form>
</main>
<!-- Footer Actions -->
<div class="w-full p-4 bg-background-light dark:bg-background-dark">
<div class="flex flex-col gap-3">
<button data-nav="next" class="w-full cursor-pointer flex items-center justify-center rounded-full h-14 px-6 bg-primary hover:bg-[#d97b20] active:scale-[0.98] transition-all text-white dark:text-surface-dark text-[16px] font-bold tracking-wide shadow-lg shadow-primary/20">
                    선택하고 계속
                </button>
<button data-nav="next" class="w-full cursor-pointer flex items-center justify-center rounded-full h-12 px-6 bg-transparent hover:bg-primary/5 text-text-secondary-light dark:text-text-secondary-dark text-sm font-semibold transition-colors">
                    건너뛰기
                </button>
</div>
</div>
<!-- Safe area spacing for iOS home indicator -->
<div class="h-2 w-full bg-background-light dark:bg-background-dark"></div>
</div>
</body></html>
